<!DOCTYPE html>
<html>
<head>
    <title>AI Network Config Generator</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f9f9f9;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        .output {
            margin-top: 20px;
            background: #222;
            color: #0f0;
            padding: 15px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<h2>🤖 AI Network Config Generator</h2>

<form method="POST">
    <textarea name="user_input" placeholder="Enter your network request..."></textarea><br><br>
    <button type="submit">Generate Config</button>
</form>

{% if output %}
<div class="output">
    <pre>{{ output }}</pre>
</div>
{% endif %}

</body>
</html>
